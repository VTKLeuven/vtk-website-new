limit_req_zone $binary_remote_addr zone=ticket_checkout:10m rate=10r/m;

# Main site: vtk.be
server {
    listen 80;
    listen [::]:80;
    server_name vtk.be www.vtk.be;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vtk.be www.vtk.be;

    ssl_certificate     /etc/letsencrypt/live/vtk.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vtk.be/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 100m;

    location = /api/tickets/checkout {
        client_max_body_size 256k;
        limit_req zone=ticket_checkout burst=5 nodelay;
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location = /api/tickets/stripe/webhook {
        client_max_body_size 1m;
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }
}

# Logistiek submodule: logistiek.vtk.be
server {
    listen 80;
    server_name logistiek.vtk.be;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name logistiek.vtk.be;

    ssl_certificate     /etc/letsencrypt/live/logistiek.vtk.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logistiek.vtk.be/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://logistiek:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }
}

# MinIO public CDN: cdn.vtk.be serves the public bucket
server {
    listen 80;
    server_name cdn.vtk.be;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name cdn.vtk.be;

    ssl_certificate     /etc/letsencrypt/live/cdn.vtk.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.vtk.be/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        # Strip leading slash and prepend bucket name
        rewrite ^/(.*)$ /vtk/$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }
}
