services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vtk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vtk}
      POSTGRES_DB: ${POSTGRES_DB:-vtk}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # No host `ports`: avoids clashes with Postgres (or anything) already bound on
    # the machine. Other services reach this DB at hostname `postgres` port 5432.
    # To expose on the host (e.g. psql), add under this service:
    #   ports: ["127.0.0.1:YOUR_FREE_PORT:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-vtk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    # Repo-root `.env` (relative to this compose file). Brings SEED_ADMIN_* etc. into
    # the container. Do NOT also set SEED_* under `environment:` with ${VAR:-} —
    # an empty compose substitution overrides env_file and skips admin seeding.
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-vtk}:${POSTGRES_PASSWORD:-vtk}@postgres:5432/${POSTGRES_DB:-vtk}?schema=public
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.vtk.be}
      VTK_MAIN_URL: ${VTK_MAIN_URL:-https://vtk.be}
      # Object storage (S3/Hetzner) is configured at runtime via Admin -> IT and
      # stored in the database (secret key encrypted). Any S3_* values coming
      # from ../.env act only as a fallback until it is configured there.
    ports:
      - "127.0.0.1:3011:3000"

  logistiek:
    build:
      context: ..
      dockerfile: infra/docker/logistiek.Dockerfile
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    environment:
      NODE_ENV: production
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.vtk.be}
      VTK_MAIN_URL: ${VTK_MAIN_URL:-https://vtk.be}
    ports:
      - "127.0.0.1:3100:3000"

  # Optional: TLS + reverse proxy in Docker. Skip if you use Caddy/Traefik/etc. on
  # the host and only proxy to web (3011) / logistiek (3100). Start with:
  #   docker compose --profile edge-tls -f infra/docker-compose.yml up -d
  nginx:
    profiles: ["edge-tls"]
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
      - logistiek
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/certbot:ro

  certbot:
    profiles: ["edge-tls"]
    image: certbot/certbot:latest
    restart: "no"
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done
      "

volumes:
  postgres-data:
