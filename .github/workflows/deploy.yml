name: Verify and deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://vtk:vtk@127.0.0.1:5432/vtk_test?schema=public
      BETTER_AUTH_SECRET: 4tFQwV8Gq2YcX9nB6mR3kL7sP5uD1zH0jA8eC4vN2xM
      TICKETING_TOKEN_SECRET: 7gK3wQ9cT2mV8xN4pR6yH1dF5sL0aJ7uB9eC3zX6qWk
      TICKETING_MAINTENANCE_SECRET: 5nD8vL2qH7xM4cR9wT1sF6jK3pY0uA5eB8gN2zQ7mVc
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vtk
          POSTGRES_PASSWORD: vtk
          POSTGRES_DB: vtk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vtk -d vtk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Prisma client
        run: |
          cp .env.example .env
          npm run db:generate

      - name: Run web unit tests
        run: npm run test --workspace=@vtk/web

      - name: Validate types and lint
        run: |
          npm exec --workspace=@vtk/web -- next typegen
          npx tsc --noEmit -p apps/web/tsconfig.json
          npm run lint --workspace=@vtk/web

      - name: Apply migrations and run database integration tests
        run: |
          npx prisma migrate deploy --schema packages/db/prisma/schema.prisma
          npm run test:integration --workspace=@vtk/web

      - name: Build production application
        run: npm run build --workspace=@vtk/web

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser security smoke
        run: npm run test:e2e:tickets --workspace=@vtk/web

  deploy:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy through SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd /home/it/vtk-website-new &&
            git fetch --all &&
            git reset --hard origin/main &&

            # Validate, build, restart, and remove services deleted from Compose.
            docker compose -f infra/docker-compose.yml config --quiet &&
            docker compose -f infra/docker-compose.yml up -d --build --remove-orphans
          "
