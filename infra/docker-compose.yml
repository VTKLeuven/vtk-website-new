x-immich-env: &immich-env
  - path: ./immich/.env.example
  - path: ./immich/.env
    required: false

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vtk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vtk}
      POSTGRES_DB: ${POSTGRES_DB:-vtk}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-vtk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    # The root env contains app settings. The optional Immich env overlay keeps
    # face-search DB credentials synchronized with the Immich database.
    env_file:
      - ../.env
      - path: ./immich/.env.example
      - path: ./immich/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-vtk}:${POSTGRES_PASSWORD:-vtk}@postgres:5432/${POSTGRES_DB:-vtk}?schema=public
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.vtk.be}
      VTK_MAIN_URL: ${VTK_MAIN_URL:-https://vtk.be}
      # The website talks to Immich over the private Compose network.
      GALLERY_IMMICH_API_URL: http://immich-server:2283/api
      GALLERY_DATABASE_HOST: immich-database
      # Object storage (Hetzner S3) is configured at runtime via Admin -> IT and
      # stored in the database. S3_* values from ../.env are only a fallback.
    ports:
      - "127.0.0.1:3011:3000"

  logistiek:
    build:
      context: ..
      dockerfile: infra/docker/logistiek.Dockerfile
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    environment:
      NODE_ENV: production
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.vtk.be}
      VTK_MAIN_URL: ${VTK_MAIN_URL:-https://vtk.be}
    ports:
      - "127.0.0.1:3100:3000"

  ticket-worker:
    image: curlimages/curl:8.10.1
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    env_file:
      - ../.env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -z "$${TICKETING_MAINTENANCE_SECRET:-}" ]; then
          echo "Ticket worker disabled: TICKETING_MAINTENANCE_SECRET is empty"
          while true; do sleep 3600; done
        fi
        while true; do
          if curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $${TICKETING_MAINTENANCE_SECRET}" \
            http://web:3000/api/tickets/maintenance; then
            date +%s > /tmp/ticket-worker-heartbeat
          fi
          sleep 15
        done
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          test -n "$${TICKETING_MAINTENANCE_SECRET:-}" &&
          test -f /tmp/ticket-worker-heartbeat &&
          [ "$$(($$(date +%s) - $$(cat /tmp/ticket-worker-heartbeat)))" -lt 90 ]
      interval: 30s
      timeout: 5s
      retries: 1
      start_period: 45s

  immich-server:
    image: ghcr.io/immich-app/immich-server:v3.0.1
    restart: unless-stopped
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-database:
        condition: service_healthy
    env_file: *immich-env
    environment:
      DB_HOSTNAME: immich-database
      REDIS_HOSTNAME: immich-redis
    volumes:
      - ./immich/data/library:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      # Caddy is the public edge; Immich itself is reachable only from the host.
      - "127.0.0.1:2283:2283"
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v3.0.1
    restart: unless-stopped
    env_file: *immich-env
    volumes:
      - immich-model-cache:/cache
    healthcheck:
      disable: false

  immich-redis:
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    restart: unless-stopped
    env_file: *immich-env
    environment:
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ./immich/data/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  immich-public-proxy:
    image: alangrainger/immich-public-proxy:latest
    restart: unless-stopped
    depends_on:
      immich-server:
        condition: service_healthy
    env_file: *immich-env
    environment:
      IMMICH_URL: http://immich-server:2283
    ports:
      # Point the public gallery hostname in Caddy at this loopback port.
      - "127.0.0.1:3014:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/share/healthcheck -o /dev/null || exit 1"]
      start_period: 10s
      timeout: 5s

volumes:
  postgres-data:
  immich-model-cache:
